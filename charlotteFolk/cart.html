<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Charlotte Folk</title>
    <link rel="icon" type="image/png" href="https://cdn.shopify.com/s/files/1/0527/5805/3051/files/cf_logoo_5d0317aa-f546-437b-9f7d-655c0c2769c0.png?crop=center&height=32&v=1723628464&width=32">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: #151515;
            background: #fff;
            font-family: "Roboto Condensed", Arial, sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            min-height: 74px;
            padding: 18px clamp(18px, 4vw, 48px);
            border-bottom: 1px solid #e2e2e2;
        }

        .logo {
            font-family: Helvetica, Arial, sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 22px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .cart-page {
            width: min(1120px, calc(100% - 36px));
            margin: 0 auto;
            padding: 42px 0 64px;
        }

        .cart-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
            border-bottom: 1px solid #e2e2e2;
            padding-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-family: Helvetica, Arial, sans-serif;
            font-size: clamp(30px, 5vw, 46px);
            line-height: 1;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .continue-link {
            font-size: 13px;
            text-decoration: underline;
            text-underline-offset: 3px;
            text-transform: uppercase;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 38px;
            align-items: start;
        }

        .cart-list {
            display: grid;
            gap: 18px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 116px minmax(0, 1fr) auto;
            gap: 18px;
            padding-bottom: 18px;
            border-bottom: 1px solid #e2e2e2;
        }

        .cart-item img {
            width: 116px;
            aspect-ratio: 1;
            object-fit: cover;
            border: 1px solid #e2e2e2;
            background: #f7f7f7;
        }

        .cart-item h2 {
            margin: 0 0 8px;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 16px;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .cart-item p {
            margin: 0 0 14px;
            color: #555;
        }

        .quantity-control {
            display: inline-grid;
            grid-template-columns: 36px 42px 36px;
            align-items: center;
            min-height: 38px;
            border: 1px solid #dedede;
            text-align: center;
        }

        .quantity-control button,
        .cart-item__total button,
        .summary-button,
        .clear-button {
            cursor: pointer;
            font: inherit;
        }

        .quantity-control button {
            height: 36px;
            border: 0;
            background: #fff;
            font-size: 18px;
        }

        .cart-item__total {
            display: grid;
            justify-items: end;
            gap: 12px;
            font-size: 14px;
        }

        .cart-item__total button,
        .clear-button {
            border: 0;
            background: transparent;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .cart-summary {
            border: 1px solid #e2e2e2;
            padding: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .summary-note {
            margin: 0 0 18px;
            color: #555;
            font-size: 14px;
            line-height: 1.45;
        }

        .summary-button {
            width: 100%;
            min-height: 48px;
            border: 1px solid #151515;
            background: #151515;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
        }

        .clear-button {
            width: 100%;
            margin-top: 14px;
            color: #555;
        }

        .empty-cart {
            padding: 48px 0;
            color: #555;
            text-align: center;
        }

        .empty-cart p {
            margin: 0 0 18px;
        }

        .empty-cart a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 20px;
            border: 1px solid #151515;
            background: #151515;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
        }

        @media (max-width: 760px) {
            .site-header,
            .cart-header {
                align-items: flex-start;
                flex-direction: column;
            }

            .nav-links {
                width: 100%;
                justify-content: space-between;
                gap: 12px;
            }

            .cart-layout {
                grid-template-columns: 1fr;
            }

            .cart-item {
                grid-template-columns: 88px minmax(0, 1fr);
            }

            .cart-item img {
                width: 88px;
            }

            .cart-item__total {
                grid-column: 1 / -1;
                justify-items: start;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a class="logo" href="index.html">Charlotte Folk</a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="collections.html">Collections</a>
            <a href="contact.html">Support</a>
            <a href="cart.html" data-cart-link>Cart</a>
        </nav>
    </header>

    <main class="cart-page">
        <div class="cart-header">
            <h1>Your cart</h1>
            <a class="continue-link" href="index.html">Continue shopping</a>
        </div>

        <div id="emptyCart" class="empty-cart" hidden>
            <p>Your cart is currently empty.</p>
            <a href="shop.html">Start shopping</a>
        </div>

        <div class="cart-layout">
            <section id="cartItems" class="cart-list" aria-label="Cart items"></section>

            <aside id="cartSummary" class="cart-summary" hidden>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">PHP 0.00</span>
                </div>
                <p class="summary-note">Taxes, shipping, and discounts are not connected in this static clone.</p>
                <button id="checkoutButton" class="summary-button" type="button">Checkout</button>
                <button id="clearCart" class="clear-button" type="button">Clear cart</button>
            </aside>
        </div>
    </main>

    <script src="preload.js" defer></script>
</body>
</html>
