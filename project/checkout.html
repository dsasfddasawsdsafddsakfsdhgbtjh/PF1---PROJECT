<!DOCTYPE html>
<html>
<head>
    <title>Charlotte Folk | Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<section class="featured">

    <h2>Checkout</h2>

    <div id="checkoutItems"></div>

    <h3 id="checkoutTotal">
        Total: ₱0
    </h3>

    <br>

    <input
        type="text"
        id="fullName"
        placeholder="Full Name"
    >

    <br><br>

    <input
        type="text"
        id="address"
        placeholder="Address"
    >

    <br><br>

    <input
        type="text"
        id="phone"
        placeholder="Phone Number"
    >

    <br><br>

    <button onclick="placeOrder()">
        Place Order
    </button>

</section>

<script src="js/checkout.js"></script>

</body>
</html>
